        body {

            padding: 0;

            align-items: center;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            position: relative;

            position: absolute;

            max-width: 300px;

        }
        .footer {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: #666;
            font-weight: bold;
            z-index: 2;
        }
    </style>
</head>
